<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booknest — Sign In / Sign Up</title>
  <meta name="description" content="Sign in or create an account to book movie seats on Booknest." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/ui/styles.css" />
</head>
<body>

<!-- Background blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<!-- Nav -->
<nav class="nav">
  <a href="#" class="brand">
    <div class="brand-icon">🎬</div>
    Booknest
  </a>
</nav>

<div class="page auth-page">
  <div class="auth-card">
    <div class="auth-card-header">
      <div class="logo-big">🎬</div>
      <h1 id="authTitle">Welcome back</h1>
      <p id="authSubtitle">Sign in to book your seats</p>
    </div>

    <!-- Tab row -->
    <div class="tab-row">
      <button class="tab" id="tabSignin" onclick="switchTab('signin')">Sign In</button>
      <button class="tab active" id="tabSignup" onclick="switchTab('signup')">Sign Up</button>
    </div>

    <!-- Sign In form -->
    <form id="formSignin" class="hidden" onsubmit="handleSignin(event)">
      <div class="field">
        <label for="siEmail">Email</label>
        <input id="siEmail" type="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="siPassword">Password</label>
        <input id="siPassword" type="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>
      <button class="btn btn-gold btn-full mt-8" type="submit" id="btnSignin">
        Sign In
      </button>
      <p class="text-sm text-muted text-center mt-16">
        Don't have an account?
        <a href="#" onclick="switchTab('signup')" style="color:var(--gold);text-decoration:none;">Sign up →</a>
      </p>
    </form>

    <!-- Sign Up form -->
    <form id="formSignup" onsubmit="handleSignup(event)">
      <div class="field-row">
        <div class="field">
          <label for="suFirst">First Name</label>
          <input id="suFirst" type="text" placeholder="John" required />
        </div>
        <div class="field">
          <label for="suLast">Last Name</label>
          <input id="suLast" type="text" placeholder="Doe" required />
        </div>
      </div>
      <div class="field">
        <label for="suEmail">Email</label>
        <input id="suEmail" type="email" placeholder="you@example.com" autocomplete="email" required />
      </div>
      <div class="field">
        <label for="suPassword">Password</label>
        <input id="suPassword" type="password" placeholder="Min 8 characters" autocomplete="new-password" required minlength="6" />
      </div>
      <button class="btn btn-gold btn-full mt-8" type="submit" id="btnSignup">
        Create Account
      </button>
      <p class="text-sm text-muted text-center mt-16">
        Already have an account?
        <a href="#" onclick="switchTab('signin')" style="color:var(--gold);text-decoration:none;">Sign in →</a>
      </p>
    </form>
  </div>
</div>

<!-- Toast area -->
<div class="toast-area" id="toastArea"></div>

<script src="/ui/signup.js"></script>
</body>
</html>
